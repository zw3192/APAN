<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manhattan Rent Yield - Personal Savings Index</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-deep: #06090f;
            --bg-panel: #0d1117;
            --accent: #bef264; 
            --text-main: #f8fafc;
            --text-muted: #8b949e;
            --border: #30363d;
            --savings-blue: #38bdf8;
            --yield-gold: #fbbf24;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: #000; 
            margin: 0; 
            padding: 10px; 
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .dashboard {
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8);
        }

        .header {
            padding: 16px 30px;
            background: #161b22;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
        }

        .brand { 
            font-size: 18px; 
            font-weight: 700; 
            color: var(--accent); 
            display: flex; 
            align-items: center; 
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .stats-container {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .stat-item {
            text-align: right;
        }

        .stat-label { 
            font-size: 9px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-weight: 700; 
            letter-spacing: 1.5px;
            margin-bottom: 2px;
        }
        .stat-value { 
            font-family: 'JetBrains Mono'; 
            font-weight: 700; 
            color: var(--savings-blue); 
            font-size: 22px;
        }
        .stat-value.gold { color: var(--yield-gold); }

        .main-content {
            display: grid;
            grid-template-columns: 380px 1fr;
            flex-grow: 1;
            min-height: 0;
        }

        .sidebar {
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .filter-section {
            margin-bottom: 30px;
        }

        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        select {
            width: 100%; 
            background: #010409; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 14px; 
            border-radius: 10px; 
            outline: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        select:hover { border-color: var(--savings-blue); }

        .property-card {
            background: #161b22;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .property-card:hover { 
            border-color: var(--accent); 
            background: #1c2128;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.5);
        }

        .rent-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .rent-tag {
            background: var(--accent);
            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: 'JetBrains Mono';
            font-weight: 700;
            font-size: 14px;
        }

        .saving-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--savings-blue);
            font-weight: 600;
        }

        .comparison-bar {
            height: 4px;
            width: 100%;
            background: #30363d;
            border-radius: 2px;
            margin: 10px 0;
            position: relative;
        }
        .comparison-fill {
            position: absolute;
            height: 100%;
            background: var(--savings-blue);
            border-radius: 2px;
        }

        #map { width: 100%; height: 100%; background: #06090f; }

        .custom-marker {
            width: 24px;
            height: 24px;
            background: var(--accent);
            border: 4px solid #000;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(190, 242, 100, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 10px;
            font-weight: 900;
        }

        .leaflet-popup-content-wrapper { background: #161b22; color: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 220px !important; }
        .popup-header { background: var(--accent); color: #000; padding: 10px; font-weight: 700; font-size: 13px; }
        .popup-body { padding: 12px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <header class="header">
        <div class="brand">
            <i class="fa-solid fa-wallet"></i>
            RENT YIELD INDEX
        </div>
        
        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-label">Avg. Personal Savings</div>
                <div class="stat-value" id="avg-savings-val">$0 /yr</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Neighborhood Value Score</div>
                <div class="stat-value gold" id="yield-score">0.0</div>
            </div>
        </div>
    </header>

    <div class="main-content">
        <aside class="sidebar">
            <div class="filter-section">
                <div class="sidebar-title">
                    <span>Select Neighborhood</span>
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <select id="hood-filter">
                    <option value="all">Compare All Manhattan</option>
                    <option value="uws">Upper West Side</option>
                    <option value="ues">Upper East Side</option>
                    <option value="chelsea">Chelsea / Hudson Yards</option>
                    <option value="midtown">Midtown / Hell's Kitchen</option>
                    <option value="fidi">Financial District</option>
                </select>
            </div>

            <div class="sidebar-title">
                <span>Top Value Picks</span>
                <span id="result-count">0</span>
            </div>
            <div id="listing-feed"></div>
        </aside>

        <section id="map-container">
            <div id="map"></div>
        </section>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const DATA = {
        uws: [
            { name: "The Aire", addr: "200 W 67th St", rent: 3250, market: 5400, lat: 40.7748, lng: -73.9825 },
            { name: "Hawthorn Park", addr: "160 W 62nd St", rent: 3100, market: 5200, lat: 40.7712, lng: -73.9835 },
            { name: "One Columbus", addr: "1 Columbus Pl", rent: 2850, market: 4600, lat: 40.7690, lng: -73.9870 }
        ],
        ues: [
            { name: "85 East End", addr: "85 East End Ave", rent: 2700, market: 4200, lat: 40.7745, lng: -73.9435 },
            { name: "The Colorado", addr: "201 E 86th St", rent: 2950, market: 4800, lat: 40.7785, lng: -73.9525 }
        ],
        chelsea: [
            { name: "The Lyra", addr: "555 W 38th St", rent: 2600, market: 4300, lat: 40.7585, lng: -73.9985 },
            { name: "The Eugene", addr: "435 W 31st St", rent: 3300, market: 5100, lat: 40.7530, lng: -73.9995 },
            { name: "Abington House", addr: "500 W 30th St", rent: 2900, market: 4800, lat: 40.7520, lng: -74.0040 }
        ],
        midtown: [
            { name: "Via 57 West", addr: "625 W 57th St", rent: 3100, market: 5800, lat: 40.7715, lng: -73.9935 },
            { name: "The Max", addr: "606 W 57th St", rent: 2850, market: 5100, lat: 40.7705, lng: -73.9925 }
        ],
        fidi: [
            { name: "20 Exchange Pl", addr: "20 Exchange Pl", rent: 3050, market: 4700, lat: 40.7055, lng: -74.0095 },
            { name: "70 Pine St", addr: "70 Pine Street", rent: 3200, market: 5300, lat: 40.7065, lng: -74.0080 }
        ]
    };

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([40.75, -73.98], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    const markers = L.layerGroup().addTo(map);

    function calculatePersonalYield(rent, market) {
        const monthlySaving = market - rent;
        const annualSaving = monthlySaving * 12;
        // How many "free months" of rent are the savings equivalent to?
        const monthsFreeEquivalent = (annualSaving / rent).toFixed(1);
        return { annualSaving, monthlySaving, monthsFreeEquivalent };
    }

    function updateDashboard() {
        const selection = document.getElementById('hood-filter').value;
        const feed = document.getElementById('listing-feed');
        const avgDisplay = document.getElementById('avg-savings-val');
        const scoreDisplay = document.getElementById('yield-score');
        const resultCount = document.getElementById('result-count');
        
        let buildings = [];
        if (selection === 'all') {
            Object.values(DATA).forEach(list => buildings.push(...list));
        } else {
            buildings = DATA[selection] || [];
        }
        
        markers.clearLayers();
        feed.innerHTML = '';
        resultCount.innerText = buildings.length;

        let totalSavings = 0;
        let totalScore = 0;

        buildings.forEach(b => {
            const yield = calculatePersonalYield(b.rent, b.market);
            totalSavings += yield.annualSaving;
            totalScore += parseFloat(yield.monthsFreeEquivalent);

            // Add Marker
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="custom-marker"><i class="fa-solid fa-check"></i></div>`,
                iconSize: [24, 24]
            });

            L.marker([b.lat, b.lng], { icon }).addTo(markers).bindPopup(`
                <div class="popup-header">${b.name}</div>
                <div class="popup-body">
                    <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px;">${b.addr}</div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 700; color: var(--accent);">$${b.rent.toLocaleString()}</span>
                        <span style="font-size: 10px; color: var(--savings-blue);">Save $${yield.monthlySaving.toLocaleString()}/mo</span>
                    </div>
                </div>
            `);

            // Add Card
            const card = document.createElement('div');
            card.className = 'property-card';
            const savePct = (yield.monthlySaving / b.market * 100).toFixed(0);
            
            card.innerHTML = `
                <div class="rent-row">
                    <div>
                        <div style="font-weight: 700; font-size: 15px; color: #fff;">${b.name}</div>
                        <div style="font-size: 11px; color: var(--text-muted);">${b.addr}</div>
                    </div>
                    <div class="rent-tag">$${b.rent.toLocaleString()}</div>
                </div>
                <div class="comparison-bar">
                    <div class="comparison-fill" style="width: ${savePct}%"></div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="saving-badge">
                        <i class="fa-solid fa-piggy-bank"></i>
                        $${yield.annualSaving.toLocaleString()} saved / year
                    </div>
                    <div style="font-size: 10px; color: var(--yield-gold); font-weight: 700;">
                        ${yield.monthsFreeEquivalent} MONTHS FREE EQ.
                    </div>
                </div>
            `;
            card.onclick = () => {
                map.flyTo([b.lat, b.lng], 16);
                // Simple popup trigger simulated
            };
            feed.appendChild(card);
        });

        // Global Analytics (Average per user)
        if (buildings.length > 0) {
            const avgPersonal = Math.round(totalSavings / buildings.length);
            const avgScore = (totalScore / buildings.length).toFixed(1);
            
            avgDisplay.innerText = `$${avgPersonal.toLocaleString()} /yr`;
            scoreDisplay.innerText = avgScore;

            const group = new L.featureGroup(markers.getLayers());
            map.fitBounds(group.getBounds().pad(0.2));
        }
    }

    document.getElementById('hood-filter').onchange = updateDashboard;
    window.onload = updateDashboard;
</script>
</body>
</html>
